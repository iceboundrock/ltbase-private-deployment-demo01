name: Preview LTBase Blueprint

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  verify_prebuilt_install:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: Lychee-Technology/ltbase-deploy-workflows
          ref: feature/prebuilt-infra-binaries-consumer
          path: .ltbase/workflow-repo

      - name: Install prebuilt infra binary
        id: install
        uses: ./.ltbase/workflow-repo/.github/actions/install-prebuilt-infra-binary
        with:
          repository: ${{ github.repository }}
          binaries-repo: Lychee-Technology/ltbase-private-deployment-binaries
          commit: ${{ github.sha }}
          working-directory: infra
          token: ${{ github.token }}

      - name: Assert install path was used
        run: |
          test "${{ steps.install.outputs.installed }}" = "true"
          test -x infra/.pulumi/bin/ltbase-infra
