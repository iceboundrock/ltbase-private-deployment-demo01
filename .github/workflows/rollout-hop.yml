name: Rollout LTBase Promotion Hop

on:
  workflow_call:
    inputs:
      release_id:
        description: Official LTBase release tag to deploy
        required: true
        type: string
      target_stack:
        description: Stack to deploy in this hop
        required: true
        type: string
      from_stack:
        description: Current stack before this hop
        required: false
        default: ""
        type: string
      continue_chain:
        description: Dispatch the next hop automatically after success
        required: false
        default: false
        type: boolean
    outputs:
      release_id:
        value: ${{ jobs.rollout.outputs.release_id }}
      target_stack:
        value: ${{ jobs.prepare.outputs.target_stack }}
      next_stack:
        value: ${{ jobs.prepare.outputs.next_stack }}
      deployment_outputs_json:
        value: ${{ jobs.rollout.outputs.deployment_outputs_json }}
  workflow_dispatch:
    inputs:
      release_id:
        description: Official LTBase release tag to deploy
        required: true
        type: string
      target_stack:
        description: Stack to deploy in this hop
        required: true
        type: string
      from_stack:
        description: Current stack before this hop
        required: false
        type: string
      continue_chain:
        description: Dispatch the next hop automatically after success
        required: false
        default: false
        type: boolean

permissions:
  actions: write
  contents: read
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-24.04-arm
    outputs:
      release_id: ${{ steps.plan.outputs.release_id }}
      start_stack: ${{ steps.plan.outputs.start_stack }}
      target_stack: ${{ steps.plan.outputs.target_stack }}
      target_stack_upper: ${{ steps.plan.outputs.target_stack_upper }}
      next_stack: ${{ steps.plan.outputs.next_stack }}
      approval_required: ${{ steps.plan.outputs.approval_required }}
      continue_chain: ${{ steps.plan.outputs.continue_chain }}
      run_canary: ${{ steps.plan.outputs.run_canary }}
    steps:
      - id: plan
        env:
          INPUT_RELEASE_ID: ${{ inputs.release_id || vars.LTBASE_RELEASE_ID }}
          INPUT_TARGET_STACK: ${{ inputs.target_stack }}
          INPUT_FROM_STACK: ${{ inputs.from_stack }}
          INPUT_CONTINUE_CHAIN: ${{ inputs.continue_chain }}
          STACKS: ${{ vars.STACKS || 'devo,prod' }}
          PROMOTION_PATH: ${{ vars.PROMOTION_PATH || vars.STACKS || 'devo,prod' }}
        run: |
          normalize_csv() {
            printf '%s' "$1" | tr -d '[:space:]'
          }

          stack_upper() {
            printf '%s' "$1" | tr '[:lower:]-' '[:upper:]_'
          }

          stacks="$(normalize_csv "${STACKS}")"
          promotion_path="$(normalize_csv "${PROMOTION_PATH}")"
          IFS=',' read -r -a stack_list <<<"${stacks}"
          IFS=',' read -r -a path <<<"${promotion_path}"

          start_stack="${path[0]:-}"
          target_stack="${INPUT_TARGET_STACK:-${start_stack}}"
          from_stack="${INPUT_FROM_STACK:-}"
          continue_chain="false"
          if [[ "${INPUT_CONTINUE_CHAIN}" == "true" ]]; then
            continue_chain="true"
          fi

          if [[ -z "${start_stack}" ]]; then
            echo "PROMOTION_PATH must define at least one stack" >&2
            exit 1
          fi

          target_index=-1
          from_index=-1
          stack_present="false"
          for index in "${!path[@]}"; do
            if [[ "${path[$index]}" == "${target_stack}" ]]; then
              target_index="${index}"
            fi
            if [[ -n "${from_stack}" && "${path[$index]}" == "${from_stack}" ]]; then
              from_index="${index}"
            fi
          done

          for stack in "${stack_list[@]}"; do
            if [[ "${stack}" == "${target_stack}" ]]; then
              stack_present="true"
              break
            fi
          done

          if [[ "${stack_present}" != "true" || "${target_index}" -lt 0 ]]; then
            echo "target stack ${target_stack} is not in PROMOTION_PATH" >&2
            exit 1
          fi

          if [[ -n "${from_stack}" ]]; then
            expected_index=$((from_index + 1))
            if [[ "${from_index}" -lt 0 || "${expected_index}" -ge "${#path[@]}" || "${path[$expected_index]}" != "${target_stack}" ]]; then
              echo "invalid promotion hop: ${from_stack} -> ${target_stack}" >&2
              exit 1
            fi
          fi

          next_stack=""
          if (( target_index + 1 < ${#path[@]} )); then
            next_stack="${path[$((target_index + 1))]}"
          fi

          approval_required="false"
          run_canary="false"
          if [[ "${target_stack}" != "${start_stack}" ]]; then
            approval_required="true"
            run_canary="true"
          fi

          {
            echo "release_id=${INPUT_RELEASE_ID}"
            echo "start_stack=${start_stack}"
            echo "target_stack=${target_stack}"
            echo "target_stack_upper=$(stack_upper "${target_stack}")"
            echo "next_stack=${next_stack}"
            echo "approval_required=${approval_required}"
            echo "continue_chain=${continue_chain}"
            echo "run_canary=${run_canary}"
          } >> "${GITHUB_OUTPUT}"

  validate_config:
    needs: prepare
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Validate Pulumi stack config
        run: ./scripts/check-pulumi-stack-config.sh --stack ${{ needs.prepare.outputs.target_stack }}

  approve:
    needs:
      - prepare
      - validate_config
    if: ${{ needs.prepare.outputs.approval_required == 'true' }}
    runs-on: ubuntu-24.04-arm
    environment: ${{ needs.prepare.outputs.target_stack }}
    steps:
      - run: echo "approval granted for ${{ needs.prepare.outputs.target_stack }}"

  rollout:
    needs:
      - prepare
      - validate_config
      - approve
    if: ${{ always() && needs.prepare.result == 'success' && (needs.prepare.outputs.approval_required != 'true' || needs.approve.result == 'success') }}
    uses: Lychee-Technology/ltbase-deploy-workflows/.github/workflows/rollout-hop.yml@main
    with:
      pulumi_stack: ${{ needs.prepare.outputs.target_stack }}
      aws_region: ${{ vars[format('AWS_REGION_{0}', needs.prepare.outputs.target_stack_upper)] }}
      release_id: ${{ needs.prepare.outputs.release_id }}
      pulumi_backend_url: ${{ vars.PULUMI_BACKEND_URL }}
      pulumi_secrets_provider: ${{ vars[format('PULUMI_SECRETS_PROVIDER_{0}', needs.prepare.outputs.target_stack_upper)] }}
      releases_repo: ${{ vars.LTBASE_RELEASES_REPO || 'Lychee-Technology/ltbase-releases' }}
      working_directory: infra
      run_canary: ${{ needs.prepare.outputs.run_canary == 'true' }}
      reconcile_managed_dsql_endpoint: true
      refresh_after_apply: true
    secrets:
      aws_role_arn: ${{ secrets[format('AWS_ROLE_ARN_{0}', needs.prepare.outputs.target_stack_upper)] }}
      ltbase_releases_token: ${{ secrets.LTBASE_RELEASES_TOKEN }}
      cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  publish_schemas:
    needs:
      - prepare
      - rollout
    if: ${{ always() && needs.rollout.result == 'success' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', needs.prepare.outputs.target_stack_upper)] }}
          aws-region: ${{ vars[format('AWS_REGION_{0}', needs.prepare.outputs.target_stack_upper)] }}

      - name: Publish customer schemas
        env:
          SCHEMA_BUCKET: ${{ vars[format('SCHEMA_BUCKET_{0}', needs.prepare.outputs.target_stack_upper)] }}
        run: ./scripts/publish-schemas.sh --schema-bucket ${{ vars[format('SCHEMA_BUCKET_{0}', needs.prepare.outputs.target_stack_upper)] }}

  ensure_project:
    needs:
      - prepare
      - rollout
      - publish_schemas
    if: ${{ always() && needs.rollout.result == 'success' && needs.publish_schemas.result == 'success' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', needs.prepare.outputs.target_stack_upper)] }}
          aws-region: ${{ vars[format('AWS_REGION_{0}', needs.prepare.outputs.target_stack_upper)] }}

      - name: Validate schema bucket contract
        env:
          DEPLOYMENT_OUTPUTS_JSON: ${{ needs.rollout.outputs.deployment_outputs_json }}
          SCHEMA_BUCKET: ${{ vars[format('SCHEMA_BUCKET_{0}', needs.prepare.outputs.target_stack_upper)] }}
        run: |
          python3 - <<'PY'
          import json
          import os

          outputs = json.loads(os.environ['DEPLOYMENT_OUTPUTS_JSON'])
          output_bucket = outputs.get('schemaBucket')
          expected_bucket = os.environ['SCHEMA_BUCKET']
          if not output_bucket:
              raise SystemExit('deployment outputs missing schemaBucket')
          if output_bucket != expected_bucket:
              raise SystemExit(f'deployment outputs schemaBucket does not match workflow SCHEMA_BUCKET: {output_bucket} != {expected_bucket}')
          PY

      - name: Ensure project
        env:
          DEPLOYMENT_OUTPUTS_JSON: ${{ needs.rollout.outputs.deployment_outputs_json }}
        run: |
          python3 - <<'PY' > "${RUNNER_TEMP}/control-plane-target.json"
          import json
          import os

          outputs = json.loads(os.environ['DEPLOYMENT_OUTPUTS_JSON'])
          target = {
              'function_name': outputs.get('controlPlaneFunctionName'),
              'qualifier': outputs.get('controlPlaneAliasName'),
          }
          missing = [key for key, value in target.items() if not value]
          if missing:
              raise SystemExit(f"deployment outputs missing {', '.join(missing)}")
          print(json.dumps(target))
          PY

          function_name="$(python3 - <<'PY' "${RUNNER_TEMP}/control-plane-target.json"
          import json
          import sys

          with open(sys.argv[1], 'r', encoding='utf-8') as handle:
              target = json.load(handle)

          print(target['function_name'])
          PY
          )"
          qualifier="$(python3 - <<'PY' "${RUNNER_TEMP}/control-plane-target.json"
          import json
          import sys

          with open(sys.argv[1], 'r', encoding='utf-8') as handle:
              target = json.load(handle)

          print(target['qualifier'])
          PY
          )"

          aws lambda invoke \
            --function-name "${function_name}" \
            --qualifier "${qualifier}" \
            --cli-binary-format raw-in-base64-out \
            --payload '{"action":"ensure-project"}' \
            "${RUNNER_TEMP}/ensure-project-response.json" \
            > "${RUNNER_TEMP}/ensure-project-invoke.json"

          python3 - <<'PY' "${RUNNER_TEMP}/ensure-project-invoke.json" "${RUNNER_TEMP}/ensure-project-response.json"
          import json
          import sys

          with open(sys.argv[1], 'r', encoding='utf-8') as handle:
              invoke = json.load(handle)
          with open(sys.argv[2], 'r', encoding='utf-8') as handle:
              response = json.load(handle)

          if invoke.get('FunctionError'):
              raise SystemExit(f"ensure-project invocation failed: {invoke['FunctionError']}: {response}")
          if response.get('status') != 'success':
              raise SystemExit(f"ensure-project returned {response.get('status')}: {response.get('error', response)}")

          print(json.dumps(response))
          PY

      - name: Advance applied schema pointer
        env:
          SCHEMA_BUCKET: ${{ vars[format('SCHEMA_BUCKET_{0}', needs.prepare.outputs.target_stack_upper)] }}
        run: |
          aws s3 cp \
            "s3://${SCHEMA_BUCKET}/schemas/published/manifest.json" \
            "s3://${SCHEMA_BUCKET}/schemas/applied/manifest.json"

  audit_mtls:
    needs:
      - prepare
      - ensure_project
    if: ${{ always() && needs.ensure_project.result == 'success' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', needs.prepare.outputs.target_stack_upper)] }}
          aws-region: ${{ vars[format('AWS_REGION_{0}', needs.prepare.outputs.target_stack_upper)] }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Prepare mTLS audit env
        env:
          STACKS: ${{ vars.STACKS || 'devo,prod' }}
          PROMOTION_PATH: ${{ vars.PROMOTION_PATH || vars.STACKS || 'devo,prod' }}
          MTLS_TRUSTSTORE_KEY: mtls/cloudflare-origin-pull-ca.pem
        run: |
          stack_file="infra/Pulumi.${{ needs.prepare.outputs.target_stack }}.yaml"
          if [[ ! -f "${stack_file}" ]]; then
            echo "Missing Pulumi stack file ${stack_file}" >&2
            exit 1
          fi

          extract_stack_value() {
            local config_key="$1"
            local raw_line value

            raw_line="$(grep -E "^[[:space:]]*${config_key}:[[:space:]]*" "${stack_file}" | head -n 1 || true)"
            if [[ -z "${raw_line}" ]]; then
              return 0
            fi

            value="${raw_line#*: }"
            value="${value#*:}"
            value="${value# }"
            value="${value%\"}"
            value="${value#\"}"
            printf '%s' "${value}"
          }

          aws_region="$(extract_stack_value "ltbase-infra:awsRegion")"
          api_domain="$(extract_stack_value "ltbase-infra:apiDomain")"
          control_domain="$(extract_stack_value "ltbase-infra:controlPlaneDomain")"
          auth_domain="$(extract_stack_value "ltbase-infra:authDomain")"
          runtime_bucket="$(extract_stack_value "ltbase-infra:runtimeBucket")"
          cloudflare_zone_id="$(extract_stack_value "ltbase-infra:cloudflareZoneId")"

          if [[ -z "${aws_region}" || -z "${api_domain}" || -z "${control_domain}" || -z "${auth_domain}" || -z "${runtime_bucket}" ]]; then
            echo "Required mTLS audit values missing from ${stack_file}" >&2
            exit 1
          fi

          if [[ -z "${cloudflare_zone_id}" ]]; then
            echo "Cloudflare zone ID missing from ${stack_file}" >&2
            exit 1
          fi

          cat > .github/mTLS-audit.env <<EOF
          STACKS=${STACKS}
          PROMOTION_PATH=${PROMOTION_PATH}
          AWS_REGION_${{ needs.prepare.outputs.target_stack_upper }}=${aws_region}
          API_DOMAIN_${{ needs.prepare.outputs.target_stack_upper }}=${api_domain}
          CONTROL_DOMAIN_${{ needs.prepare.outputs.target_stack_upper }}=${control_domain}
          AUTH_DOMAIN_${{ needs.prepare.outputs.target_stack_upper }}=${auth_domain}
          RUNTIME_BUCKET_${{ needs.prepare.outputs.target_stack_upper }}=${runtime_bucket}
          CLOUDFLARE_ZONE_ID=${cloudflare_zone_id}
          MTLS_TRUSTSTORE_KEY=${MTLS_TRUSTSTORE_KEY}
          EOF

      - name: Audit Cloudflare mTLS
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: ./scripts/check-cloudflare-mtls.sh --env-file .github/mTLS-audit.env --stack ${{ needs.prepare.outputs.target_stack }}

  dispatch_next:
    needs:
      - prepare
      - ensure_project
      - audit_mtls
    if: ${{ always() && needs.ensure_project.result == 'success' && needs.prepare.outputs.continue_chain == 'true' && needs.prepare.outputs.next_stack != '' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Continue rollout chain
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/actions/workflows/rollout-hop.yml/dispatches \
            --method POST \
            -f ref="${{ github.ref_name }}" \
            -f inputs[release_id]="${{ needs.prepare.outputs.release_id }}" \
            -f inputs[target_stack]="${{ needs.prepare.outputs.next_stack }}" \
            -f inputs[from_stack]="${{ needs.prepare.outputs.target_stack }}" \
            -f inputs[continue_chain]=true
